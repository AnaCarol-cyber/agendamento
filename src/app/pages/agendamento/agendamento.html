
<header>
  <h1>Tranças Bella</h1>
  <nav>
    <ul>
     <a routerLink="/">Home</a>
      <a routerLink="/agendamento">Agendamento</a>
    </ul>
  </nav>
</header>


<section class="agendamento animar">
  <h2>Agende seu horário</h2>

  <label for="servico">Serviço</label>
  <select id="servico">
    <option value="">Selecione</option>
    <option value="penteado">Penteado (a partir de R$100)</option>
    <option value="trancas_cliente">Tranças – material do cliente (R$200)</option>
    <option value="trancas_bella">Tranças – meu material (R$350)</option>
  </select>

  <label for="data">Data</label>
  <input type="date" id="data">

  <label for="horario">Horário</label>
  <select id="horario">
    <option value="">Selecione data e serviço</option>
  </select>

  <label for="pagamento">Forma de pagamento</label>
  <select id="pagamento">
    <option value="pix">Pix ou dinheiro</option>
    <option value="cartao">Cartão (+10%)</option>
  </select>

  <p class="aviso">
    💳 Pagamentos no cartão têm acréscimo de 10%.  
    Parcelamentos sujeitos aos juros da máquina.
  </p>

  <button (click)="confirmar()">Confirmar agendamento</button>
</section>
