<section class="agendamento">
  <h2>Agendamento de Serviço</h2>

  <form (ngSubmit)="confirmarAgendamento()" #formAgendamento="ngForm">
    <!-- Nome -->
    <label for="nome">Nome</label>
    <input type="text" id="nome" [(ngModel)]="nome" name="nome" required />

    <!-- WhatsApp -->
    <label for="contato">WhatsApp</label>
    <input type="text" id="contato" [(ngModel)]="contato" name="contato" required />

    <!-- Serviço -->
    <label for="servico">Serviço</label>
    <select id="servico" [(ngModel)]="servico" name="servico" required>
      <option value="" disabled selected>Selecione um serviço</option>
      <option value="Tranças">Tranças</option>
      <option value="Penteado">Penteado</option>
      <option value="Megahair">Megahair</option>
      <option value="Outro">Outro</option>
    </select>

    <!-- Data -->
    <label for="data">Data</label>
    <input type="date" id="data" [(ngModel)]="data" name="data" required />

    <!-- Horário -->
    <label for="horario">Horário</label>
    <input type="time" id="horario" [(ngModel)]="horario" name="horario" required />

    <!-- LGPD -->
    <div class="lgpd">
      <input type="checkbox" id="consentimento" [(ngModel)]="consentimento" name="consentimento" required />
      <label for="consentimento">
        Autorizo o uso dos meus dados pessoais para fins de agendamento, conforme a LGPD.
      </label>
      <p class="lgpd-texto">
        Seus dados serão utilizados apenas para contato e confirmação do serviço.  
        Não serão compartilhados com terceiros.  
        <a routerLink="/privacidade" target="_blank">Leia nossa Política de Privacidade</a> | 
        <a routerLink="/termos" target="_blank">Leia nossos Termos de Serviço</a>.
      </p>
    </div>

    <!-- Botão -->
    <button type="submit" [disabled]="!formAgendamento.form.valid">
      Confirmar Agendamento
    </button>
  </form>
</section>
