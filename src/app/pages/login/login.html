<section class="login">
  <h2>Login Administrativo</h2>
  <form (ngSubmit)="entrar()">
    <label for="usuario">Usuário</label>
    <input type="text" id="usuario" [(ngModel)]="usuario" name="usuario" required />

<label for="senha">Senha</label>
<div class="senha-container">
  <input [type]="mostrarSenha ? 'text' : 'password'" 
         id="senha" 
         [(ngModel)]="senha" 
         name="senha" 
         required />
  <span class="toggle-senha" (click)="alternarSenha()">
    {{ mostrarSenha ? '&#x1F513;' : '&#x1F512;' }}
  </span>
</div>




    <div class="field toggle">
  <label class="switch">
    <input type="checkbox" [(ngModel)]="autoLogin" name="autoLogin" />
    <span class="slider round"></span>
  </label>
  <span class="toggle-label">Logar automaticamente</span>
</div>


    <button type="submit">Entrar</button>
  </form>
  <p *ngIf="erro" class="erro">{{erro}}</p>
</section>
